<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Florence Denys</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="oeuvres.html">Œuvres</a></li>
            <li><a href="about.html">À propos</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <main>
        <h1>Contact</h1>
        
        <section class="contact-content">
            <div class="contact-info">
                <h2>Me contacter</h2>
                
                <div class="contact-details">
                    <p>
                        <strong>Email:</strong> <a href="mailto:votre@email.com">votre@email.com</a>
                    </p>
                    <p>
                        <strong>Téléphone:</strong> [Votre numéro]
                    </p>
                    <p>
                        <strong>Lieu:</strong> [Votre lieu/ville]
                    </p>
                </div>

                <div class="social-links">
                    <h3>Suivre</h3>
                    <ul>
                        <li><a href="#">Instagram</a></li>
                        <li><a href="#">Autres plateformes</a></li>
                    </ul>
                </div>
            </div>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nom</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit">Envoyer</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Florence Denys. Tous droits réservés.</p>
    </footer>
</body>
</html>
